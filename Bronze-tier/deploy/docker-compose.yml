# Platinum Tier - Cloud Agent Docker Compose
# AI Employee Hackathon
#
# Usage:
#   docker-compose up -d          # Start in background
#   docker-compose logs -f        # View logs
#   docker-compose down           # Stop
#   docker-compose restart        # Restart
#
# Prerequisites:
#   1. Clone vault repo to ./vault/
#   2. Copy SSH key to ./ssh/id_ed25519
#   3. Create .env file with configuration

version: "2"

services:
  cloud-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: ai-employee-cloud:latest
    container_name: ai-employee-cloud
    restart: unless-stopped

    environment:
      - VAULT_AGENT_ID=cloud
      - VAULT_PATH=/data/AI_Employee_Vault
      - VAULT_SYNC_BRANCH=main
      - SYNC_INTERVAL=60
      - AGENT_INTERVAL=30
      - GIT_USER_NAME=AI Employee Cloud Agent
      - GIT_USER_EMAIL=cloud-agent@aiemployee.local
      - TZ=UTC

    volumes:
      - ./vault:/data/AI_Employee_Vault
      - ./ssh:/ssh:ro
      - ./logs:/logs

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - ai-employee-network

networks:
  ai-employee-network:
    driver: bridge
