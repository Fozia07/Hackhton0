# Platinum Tier - Cloud Agent Docker Compose
# AI Employee Hackathon
#
# Usage:
#   docker-compose up -d          # Start in background
#   docker-compose logs -f        # View logs
#   docker-compose down           # Stop
#   docker-compose restart        # Restart
#
# Prerequisites:
#   1. Clone vault repo to ./vault/
#   2. Copy SSH key to ./ssh/id_ed25519
#   3. Create .env file with configuration

version: '3.8'

services:
  # Main Cloud Agent Service
  cloud-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: ai-employee-cloud:latest
    container_name: ai-employee-cloud
    restart: unless-stopped

    # Environment configuration
    environment:
      - VAULT_AGENT_ID=cloud
      - VAULT_PATH=/data/AI_Employee_Vault
      - VAULT_SYNC_BRANCH=${VAULT_SYNC_BRANCH:-main}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-60}
      - AGENT_INTERVAL=${AGENT_INTERVAL:-30}
      - GIT_USER_NAME=${GIT_USER_NAME:-AI Employee Cloud Agent}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-cloud-agent@aiemployee.local}
      - TZ=${TZ:-UTC}

    # Volume mounts
    volumes:
      # Vault directory (the synced repository)
      - ${VAULT_PATH:-./vault}:/data/AI_Employee_Vault

      # SSH keys for Git authentication
      - ${SSH_PATH:-./ssh}:/ssh:ro

      # Logs directory
      - ${LOGS_PATH:-./logs}:/logs

    # Health check
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

    # Resource limits (adjust based on VM specs)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    # Network (isolated)
    networks:
      - ai-employee-network

  # Optional: Watchtower for auto-updates
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    profiles:
      - auto-update  # Only starts with: docker-compose --profile auto-update up

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400  # Check daily
      - WATCHTOWER_INCLUDE_STOPPED=false

    networks:
      - ai-employee-network

  # Optional: Log viewer (Dozzle)
  log-viewer:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    profiles:
      - monitoring  # Only starts with: docker-compose --profile monitoring up

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    ports:
      - "9999:8080"

    environment:
      - DOZZLE_LEVEL=info
      - DOZZLE_TAILSIZE=300

    networks:
      - ai-employee-network

networks:
  ai-employee-network:
    driver: bridge

# Named volumes (alternative to bind mounts)
volumes:
  vault-data:
    driver: local
  logs-data:
    driver: local
